plugin: amazon.aws.aws_ec2
regions:
- us-east-1
hostnames:
  # This option allows displaying the private ip addresses.
- private-ip-address
filters:
  # This selects only running instances with tag `name` tag set to `frontend-dev`.
  instance-state-name : running
  tag:Name: frontend-dev
compose:
# This sets the ansible_host variable to connect with the private IP address without changing the hostname
 ansible_host: private_ip_address
keyed_groups:
# add hosts to tags.Name groups for each aws_ec2 host's tags.Name variable.
- separator: ''
  key: tags.Name | regex_replace('-.*$', '')
# Meaning: -.*$ = “everything from - to end” Replace it with empty string