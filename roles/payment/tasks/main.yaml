- name: app setup
  #tags: 
  #- deployment
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml

- name: python setup
  #tags: 
  #- deployment
  ansible.builtin.import_role:
  #ansible.builtin.include_role:
    name: common
    tasks_from: python-setup.yaml

- name: systemd setup
  ansible.builtin.import_role:
    name: common
    tasks_from: systemd-setup.yaml

- name: install python
  ansible.builtin.dnf:
     name: "{{ item }}"
     state: present
  loop:
    - python3 
    - gcc 
    - python3-devel
- name: installing dependancies
  ansible.builtin.pip:
     requirements: requirements.txt
     executable: pip3.9
  args:
     chdir: /app

- name: restart and enabling payment
  ansible.builtin.service: 
      name: payment
      state: started
      enabled: yes